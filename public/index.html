<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12中枢大厅 - 蜀道招采万能雷达</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #060913; color: #94a3b8; overflow: hidden; }
        [v-cloak] { display: none !important; }
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        .header { height: 50px; background: #0c1222; border-bottom: 1px solid rgba(59, 130, 246, 0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; }
        .logo-text { font-size: 14px; font-weight: 900; color: #ffffff; letter-spacing: 1.5px; }
        .search-radar-input { width: 450px; padding: 7px 16px; background: #04070f; border: 1px solid rgba(59, 130, 246, 0.15); border-radius: 6px; color: #ffffff; font-size: 12px; outline: none; text-align: center; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; width: 100vw; }
        
        /* 左边控制舱（扩大至18%以容纳12个选单） */
        .sidebar-left { width: 18%; background: #080d19; border-right: 1px solid rgba(255, 255, 255, 0.02); padding: 14px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
        .section-title { font-size: 11px; font-weight: 800; color: #3b82f6; text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid #3b82f6; padding-left: 8px; }
        .card-panel { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(59, 130, 246, 0.05); border-radius: 4px; padding: 10px; }
        .form-label { display: block; font-size: 10px; color: #475569; margin-bottom: 4px; font-weight: bold; }
        .textarea-custom { width: 100%; height: 35px; background: #04070f; border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 4px; color: #ffffff; padding: 4px; font-size: 11px; outline: none; resize: none; }
        
        /* 12栏目勾选订阅矩阵组件 */
        .checkbox-group-deck { display: flex; flex-direction: column; gap: 4px; max-height: 180px; overflow-y: auto; background: #020408; padding: 6px; border-radius: 4px; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #cbd5e1; cursor: pointer; }
        .checkbox-item input { cursor: pointer; }
        
        .btn-blue { width: 100%; padding: 7px; background: #2563eb; color: white; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-trigger { width: 100%; padding: 8px; background: #991b1b; color: white; border: none; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .log-box { font-family: monospace; font-size: 9px; color: #10b981; background: #020408; padding: 6px; border-radius: 4px; height: 100px; overflow-y: auto; }

        /* ========================================================
           🖥️ 4×3 超高密度 12 工业控制视窗大盘布局
           ======================================================== */
        .content-matrix-deck { width: 82%; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 10px; padding: 12px; background: #05080f; overflow: hidden; height: 100%; }
        
        .matrix-cell-vault { background: #0d1322; border: 1px solid rgba(255,255,255,0.03); border-radius: 6px; display: flex; flex-direction: column; overflow: hidden; }
        .vault-header { padding: 8px 12px; background: #121a2e; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .vault-text { font-size: 12px; font-weight: 800; color: #ffffff; }
        .vault-more-link { font-size: 10.5px; color: #3b82f6; text-decoration: none; cursor: pointer; }
        
        .vault-scroll-stream { flex: 1; overflow: hidden; padding: 6px 10px; display: flex; flex-direction: column; gap: 4px; }
        .tender-strip-card { background: rgba(255, 255, 255, 0.01); border-bottom: 1px dashed rgba(255,255,255,0.04); padding: 5px 2px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .tender-title-txt { font-size: 11.5px; font-weight: 600; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; flex: 1; }
        .tender-title-txt:hover { color: #3b82f6; text-decoration: underline; }
        .tender-date-tag { font-size: 10px; color: #475569; white-space: nowrap; }
        .placeholder-txt { text-align: center; padding: 20px 0; color: #222f46; font-size: 11px; font-style: italic; }

        /* 全量历史瀑布画廊 */
        .matrix-exclusive-gallery { width: 82%; background: #080c16; padding: 20px; display: flex; flex-direction: column; overflow: hidden; height: 100%; }
        .gallery-top-nav { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(59,130,246,0.15); padding-bottom: 12px; margin-bottom: 15px; }
        .btn-back-hub { padding: 5px 12px; background: #1e293b; color: #cbd5e1; font-size: 11px; border-radius: 4px; cursor: pointer; border: none; }
        .gallery-title-main { font-size: 16px; font-weight: 900; color: white; }
        .gallery-scroll-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .gallery-tender-row { background: #0d1322; border: 1px solid rgba(59, 130, 246, 0.08); padding: 10px 16px; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; }
        .gallery-tender-title { font-size: 13px; font-weight: 700; color: #f1f5f9; cursor: pointer; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>
<div id="app" v-cloak>
    <div class="header">
        <div class="logo-area"><span class="logo-text">SHUDAO.MATRIX 2026</span></div>
        <input type="text" v-model="searchQuery" class="search-radar-input" placeholder="输入搜索词，12大垂直颗粒度分类即时交叉检索...">
        <div style="font-size: 12px;">
            <template v-if="username">
                <span style="color:#ffffff; font-weight: bold;">👤 {{ username }}</span>
                <button @click="logout" style="margin-left:8px; background:none; border:none; color:#475569; cursor:pointer;">退出</button>
            </template>
            <template v-else>
                <a href="/zb_login.html" style="color: #3b82f6; text-decoration: none;">🔑 凭证登录</a>
            </template>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar-left">
            <div>
                <div class="section-title">高频雷达强击</div>
                <div class="card-panel" style="margin-top:6px;">
                    <button @click="forceTriggerRadar" class="btn-trigger" :disabled="!username">🚀 突击对账</button>
                </div>
            </div>

            <div>
                <div class="section-title">私人12细分订阅面板</div>
                <div class="card-panel" style="margin-top:6px;">
                    <template v-if="username">
                        <div style="margin-bottom:8px;">
                            <label class="form-label">📌 勾选订阅垂直行业栏目</label>
                            <div class="checkbox-group-deck">
                                <label v-for="(label, key) in catMapping" :key="key" class="checkbox-item">
                                    <input type="checkbox" :value="key" v-model="subscription.selectedCats">
                                    <span>{{ label }}</span>
                                </label>
                            </div>
                        </div>
                        <div style="margin-bottom:6px;">
                            <label class="form-label">🎯 额外包含需求词</label>
                            <textarea v-model="subscription.keywords" class="textarea-custom" placeholder="多词用逗号隔开"></textarea>
                        </div>
                        <div style="margin-bottom:6px;">
                            <label class="form-label">❌ 额外排除屏蔽词</label>
                            <textarea v-model="subscription.exclude_keywords" class="textarea-custom"></textarea>
                        </div>
                        <button @click="saveSubscription" class="btn-blue">🔒 锁死栏目策略</button>
                    </template>
                    <div v-else style="font-size:11px; text-align:center; color:#475569; padding:10px 0;">请先登录以解锁12栏目专属订阅投递功能</div>
                </div>
            </div>

            <div style="flex: 1; display: flex; flex-direction: column;">
                <div class="section-title">动态对账回执</div>
                <div class="log-box" style="margin-top:6px; flex: 1;">
                    <div v-for="log in logs">{{ log }}</div>
                </div>
            </div>
        </div>

        <div class="content-matrix-deck" v-if="!activeGalleryCategory">
            <div v-for="(label, key) in catMapping" :key="key" class="matrix-cell-vault">
                <div class="vault-header">
                    <span class="vault-text">📂 {{ label }}</span>
                    <a @click="enterCategoryGallery(key, label, filteredPool(key))" class="vault-more-link">更多 ➡️</a>
                </div>
                <div class="vault-scroll-stream">
                    <div v-if="filteredPool(key).length === 0" class="placeholder-txt">暂无对账公告</div>
                    <div v-else v-for="t in filteredPool(key).slice(0, 5)" :key="t.id" class="tender-strip-card">
                        <div @click="openIndependentDetail(t)" class="tender-title-txt" :title="t.title">💡 {{ t.title }}</div>
                        <span class="tender-date-tag">四川</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="matrix-exclusive-gallery" v-else>
            <div class="gallery-top-nav">
                <h2 class="gallery-title-main">📂 {{ galleryTitle }} · 全量账本</h2>
                <button @click="exitGalleryToHub" class="btn-back-hub">🔙 返回12中枢大厅</button>
            </div>
            <div class="gallery-scroll-container">
                <div v-for="t in galleryList" :key="t.id" class="gallery-tender-row">
                    <div @click="openIndependentDetail(t)" class="gallery-tender-title" :title="t.title">💡 {{ t.title }}</div>
                    <span style="font-size:12px; color:#475569;">正牌蜀道源</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;
    new Vue({
        el: '#app',
        data: {
            username: localStorage.getItem('mail_username') || '',
            searchQuery: '',
            // 12细分分类前台数据映射表
            catMapping: {
                IT_SOFTWARE: "IT软件开发", CLOUD_INFRA: "云基础与硬件", CIVIL_DESIGN: "规划建筑设计", TECH_BIM: "三维BIM技术",
                ROAD_BRIDGE: "路桥隧道施工", EARTH_STRUCT: "土石方及基建", POWER_GRID: "电力配网强电", GREEN_ENERGY: "绿电与充电桩",
                STEEL_CEMENT: "大宗钢材水泥", HARDWARE_TOOLS: "物资五金集采", SUPERVISE_COST: "工程监理造价", CONSULT_AGENT: "代理咨询可研"
            },
            pools: {
                IT_SOFTWARE: [], CLOUD_INFRA: [], CIVIL_DESIGN: [], TECH_BIM: [], ROAD_BRIDGE: [], EARTH_STRUCT: [],
                POWER_GRID: [], GREEN_ENERGY: [], STEEL_CEMENT: [], HARDWARE_TOOLS: [], SUPERVISE_COST: [], CONSULT_AGENT: []
            },
            logs: ["📡 [12细分垂直中枢] 并网通车完毕。"],
            subscription: { keywords: '', exclude_keywords: '', selectedCats: [] },
            activeGalleryCategory: null, galleryTitle: '', galleryList: []
        },
        created() {
            if (this.username) this.fetchSubscription();
            this.fetchAllVaults();
        },
        methods: {
            filteredPool(key) {
                const pool = this.pools[key] || [];
                if (!this.searchQuery.trim()) return pool;
                const q = this.searchQuery.toLowerCase().trim();
                return pool.filter(item => item.title.toLowerCase().includes(q));
            },
            fetchAllVaults() {
                Object.keys(this.catMapping).forEach(c => {
                    axios.get(`${API_BASE}/api/tenders/list?category=${c}&t=${new Date().getTime()}`)
                    .then(res => { 
                        this.pools[c] = res.data || []; 
                        if (this.activeGalleryCategory === c) this.galleryList = this.pools[c];
                    });
                });
            },
            openIndependentDetail(tender) {
                const targetId = tender.origin_id || tender.originId;
                const encodedUrl = encodeURIComponent(tender.origin_url || tender.originUrl || '');
                if (targetId) window.open(`/detail.html?id=${targetId}&sourceUrl=${encodedUrl}`, '_blank');
            },
            fetchSubscription() {
                axios.get(`${API_BASE}/api/subscribe/get?username=${this.username}`).then(res => {
                    if (res.data) {
                        this.subscription.keywords = res.data.keywords || '';
                        this.subscription.exclude_keywords = res.data.exclude_keywords || '';
                        // 还原用户之前勾选订阅的栏目数组
                        const catsStr = res.data.sub_categories || '';
                        this.subscription.selectedCats = catsStr ? catsStr.split(',') : [];
                    }
                });
            },
            saveSubscription() {
                const payload = {
                    username: this.username,
                    keywords: this.subscription.keywords,
                    exclude_keywords: this.subscription.exclude_keywords,
                    sub_categories: this.subscription.selectedCats.join(',') // 将数组压成逗号分隔符存入DB
                };
                axios.post(`${API_BASE}/api/subscribe/save`, payload).then(res => { alert(res.data.message); });
            },
            forceTriggerRadar() {
                this.logs.unshift("⚡ [12细分雷达全量强击点火] 正在执行倒序追溯...");
                axios.post(`${API_BASE}/api/radar/force-trigger`).then(res => {
                    alert(res.data.message);
                    this.fetchAllVaults();
                });
            },
            enterCategoryGallery(cat, label, list) {
                this.activeGalleryCategory = cat; this.galleryTitle = label; this.galleryList = list;
            },
            exitGalleryToHub() { this.activeGalleryCategory = null; },
            logout() { localStorage.removeItem('mail_username'); window.location.reload(); }
        }
    });
</script>
</body>
</html>
