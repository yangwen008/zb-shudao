<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招采公告正文打捞中枢</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { background: #0b0f19; color: #cbd5e1; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 30px 15px; line-height: 1.8; margin: 0; }
        [v-cloak] { display: none !important; }
        .detail-wrapper { max-width: 950px; margin: 0 auto; background: #0d1527; padding: 35px; border-radius: 8px; border: 1px solid rgba(59, 130, 246, 0.12); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
        .loading-pane { text-align: center; color: #3b82f6; font-size: 15px; font-weight: bold; padding: 50px 0; }
        
        .article-title { font-size: 20px; font-weight: 800; color: #ffffff; line-height: 1.4; margin-bottom: 16px; }
        
        /* 🌟 【终极杀招】：大厂级霓虹发光“一键直达采集网址”特权工具条 */
        .radar-action-deck { display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #2563eb; padding-bottom: 16px; margin-bottom: 24px; background: rgba(37,99,235,0.03); padding: 12px; border-radius: 4px; border: 1px solid rgba(37,99,235,0.1); }
        .btn-direct-source { padding: 6px 16px; background: linear-gradient(135deg, #059669 0%, #10b981 100%); color: white; border: none; font-size: 12px; font-weight: 900; border-radius: 4px; cursor: pointer; text-decoration: none; box-shadow: 0 0 12px rgba(16,185,129,0.3); transition: all 0.2s ease; }
        .btn-direct-source:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 0 18px rgba(16,185,129,0.5); }
        .source-url-txt { font-size: 11px; color: #475569; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        /* 深度兼容上游 HTML 节点的富文本沙盒样式 */
        .article-body-content { color: #cbd5e1; font-size: 14.5px; }
        .article-body-content p { margin-bottom: 14px; text-align: justify; }
        .article-body-content table { width: 100% !important; border-collapse: collapse; margin: 20px 0; background: #070b14; }
        .article-body-content th, .article-body-content td { border: 1px solid #1e293b; padding: 10px 12px; text-align: left; font-size: 13.5px; }
        .article-body-content th { background: #0f172a; color: #3b82f6; font-weight: bold; }
        .article-body-content tr:nth-child(even) { background: rgba(255, 255, 255, 0.01); }
        .article-body-content img { max-width: 100%; height: auto; border-radius: 4px; margin: 12px 0; }
        
        .footer-close { margin-top: 35px; border-top: 1px dashed rgba(255,255,255,0.05); padding-top: 15px; text-align: right; }
        .btn-close { padding: 6px 16px; background: #1e293b; border: 1px solid rgba(255,255,255,0.05); color: #94a3b8; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-close:hover { background: #334155; color: white; }
    </style>
</head>
<body>
<div id="detail-app" v-cloak>
    <div class="detail-wrapper">
        <div v-if="loading" class="loading-pane">
            ⏳ 边缘大脑：正在跨境拟真打捞正牌富文本正文，请稍候...
        </div>
        <template v-else>
            <h1 class="article-title">💡 {{ pageTitle }}</h1>
            
            <div class="radar-action-deck">
                <button @click="jumpToOriginalSource" class="btn-direct-source">🌐 官方公告直达 ↗️</button>
                <span class="source-url-txt">上游物理信道：{{ originalNoticeUrl || "无外部直达路径" }}</span>
            </div>

            <div class="article-body-content" v-html="pageContent"></div>
            
            <div class="footer-close">
                <button @click="closeTab" class="btn-close">关闭本页 ↩️</button>
            </div>
        </template>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;
    new Vue({
        el: '#detail-app',
        data: {
            loading: true,
            pageTitle: '招标公告详情',
            pageContent: '',
            originId: '',
            originalNoticeUrl: '' // 用于存放透传过来的官方原始采集网址
        },
        created() {
            const urlParams = new URLSearchParams(window.location.search);
            this.originId = urlParams.get('id') || '';
            
            // 🌟 深度接收从大厅透传过来的原始 origin_url 资产
            const sourceUrlParam = urlParams.get('sourceUrl') || '';
            this.originalNoticeUrl = sourceUrlParam ? decodeURIComponent(sourceUrlParam) : '';

            if (!this.originId) {
                this.loading = false;
                this.pageContent = '<p style="color:#ef4444; text-align:center;">❌ 错误：参数缺失，无法调取本站内容。</p>';
                return;
            }
            this.打捞本站正文();
        },
        methods: {
            打捞本站正文() {
                axios.get(`${API_BASE}/api/tenders/detail?id=${this.originId}`)
                .then(res => {
                    this.loading = false;
                    this.pageTitle = res.data.title || '招标公告详情';
                    this.pageContent = res.data.content || '<p style="text-align:center; color:#94a3b8;">本站内容池暂未对账到正文</p>';
                    document.title = this.pageTitle + " - 蜀道雷达终端";
                })
                .catch(err => {
                    this.loading = false;
                    this.pageContent = `<p style="color:#ef4444; text-align:center;">❌ 边缘打捞受阻：${err.message}</p>`;
                });
            },
            // 🌟 一键直达上游采集网址开窗天线
            jumpToOriginalSource() {
                if (!this.originalNoticeUrl || this.originalNoticeUrl === '#') {
                    alert("报告指挥官，该情报未包含有效的官方原始网址链路。");
                    return;
                }
                window.open(this.originalNoticeUrl, '_blank');
            },
            closeTab() { window.close(); }
        }
    });
</script>
</body>
</html>
