<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 - 蜀道AI招标雷达</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card { width: 420px; padding: 45px; background: rgba(30, 41, 59, 0.55); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .form-title { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 30px; text-align: center; letter-spacing: 1px; }
        .form-group { position: relative; margin-bottom: 22px; }
        .form-label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .form-input { width: 100%; padding: 12px 16px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-size: 15px; outline: none; }
        .suffix-tag { position: absolute; right: 16px; color: #475569; font-size: 14px; font-weight: 700; pointer-events: none; }
        .btn-primary { width: 100%; padding: 14px; background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .card-footer { margin-top: 25px; text-align: center; font-size: 13px; color: #64748b; }
        .card-footer a { color: #60a5fa; text-decoration: none; }
    </style>
</head>
<body>
<div id="app">
    <div class="login-card">
        <h1 class="form-title">雷达中枢凭证验证</h1>
        <form @submit.prevent="handleSubmit">
            <div class="form-group">
                <label class="form-label">通行证账号</label>
                <div class="input-wrapper">
                    <input type="text" v-model="formData.username" class="form-input" placeholder="请输入用户名" required style="padding-right: 115px;">
                    <span class="suffix-tag">@shudao.ai</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">安全密码凭证</label>
                <input type="password" v-model="formData.password" class="form-input" placeholder="请输入安全密码" required>
            </div>
            <button type="submit" class="btn-primary" :disabled="loading">
                {{ loading ? '正在校验...' : '安全进入中枢' }}
            </button>
        </form>
        <div class="card-footer">
            <a href="/index.html" style="color: #94a3b8;">← 返回公开大厅免登录浏览</a>
        </div>
    </div>
</div>
<script>
    const API_BASE = window.location.origin;
    new Vue({
        el: '#app',
        data: { loading: false, formData: { username: '', password: '' } },
        methods: {
            handleSubmit() {
                if (this.loading) return;
                this.loading = true;
                axios.post(`${API_BASE}/api/login`, { username: this.formData.username.trim(), password: this.formData.password })
                .then(res => {
                    localStorage.setItem('mail_username', this.formData.username.trim());
                    // 🔒 登录成功，重定向回大厅主页（由大厅主页解开管理员发布权与配置权）
                    window.location.href = '/index.html'; 
                })
                .catch(err => { this.loading = false; alert('安全凭证校验失败'); });
            }
        }
    });
</script>
</body>
</html>
